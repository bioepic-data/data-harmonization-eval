id: https://w3id.org/bioepic/data-harmonization-eval/target-schema
name: target_schema
title: Harmonized Soil Moisture Target Schema
description: >-
  LinkML representation of the canonical harmonized dataset schema.
  Every harmonized dataset must conform to this exact 9-column schema.
  This is the LinkML equivalent of ``src/schemas/target_schema.py``: the
  ``HarmonizedRecord`` class describes a single row, with one slot per
  harmonized column. Slot ranges, units, and value constraints mirror the
  ``HARMONIZED_COLUMNS``, ``EXPECTED_DTYPES`` and ``VALID_RANGES`` constants
  in that module.
license: MIT
default_prefix: harmon
default_range: string

prefixes:
  harmon: https://w3id.org/bioepic/data-harmonization-eval/target-schema/
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types

#=================================
# Classes
#=================================
classes:

  HarmonizedRecord:
    description: >-
      A single row of a harmonized soil moisture dataset. The ordered list of
      slots corresponds exactly to ``HARMONIZED_COLUMNS`` (order matters).
      ``datetime_UTC`` and ``site_id`` are required, and at least one of the
      three moisture variables must be present.
    slots:
      - datetime_UTC
      - site_id
      - depth_m
      - replicate
      - is_timeseries
      - interval_min
      - volumetric_water_content_m3_m3
      - gravimetric_water_content_gH2O_gs
      - water_potential_kPa
    rules:
      - description: >-
          At least one moisture variable (volumetric water content, gravimetric
          water content, or water potential) must be present in a record.
        # The precondition is always satisfied (datetime_UTC is required), so the
        # postcondition is enforced unconditionally. It is stated explicitly so
        # the generated JSON Schema emits a well-formed if/then conditional.
        preconditions:
          slot_conditions:
            datetime_UTC:
              value_presence: PRESENT
        postconditions:
          any_of:
            - slot_conditions:
                volumetric_water_content_m3_m3:
                  value_presence: PRESENT
            - slot_conditions:
                gravimetric_water_content_gH2O_gs:
                  value_presence: PRESENT
            - slot_conditions:
                water_potential_kPa:
                  value_presence: PRESENT

  HarmonizedDataset:
    description: >-
      A harmonized dataset: an ordered collection of ``HarmonizedRecord`` rows
      conforming to the target schema.
    attributes:
      records:
        description: The harmonized rows that make up the dataset.
        range: HarmonizedRecord
        multivalued: true
        inlined_as_list: true

#=================================
# Slots
#=================================
slots:

  datetime_UTC:
    description: >-
      Observation timestamp in UTC. Maps to a pandas
      ``datetime64[ns, UTC]`` column. Required.
    range: datetime
    required: true
    rank: 1

  site_id:
    description: Identifier for the sampling site. Required.
    range: string
    required: true
    rank: 2

  depth_m:
    description: Sampling depth below the surface, in meters.
    range: float
    required: false
    unit:
      ucum_code: m
    minimum_value: 0.0
    maximum_value: 100.0
    rank: 3

  replicate:
    description: >-
      Replicate number for the observation. Stored as a float to allow NaN
      (missing) values. Nullable.
    range: float
    required: false
    rank: 4

  is_timeseries:
    description: >-
      Whether the record belongs to a time series (true) or is a one-off /
      point measurement (false).
    range: boolean
    required: false
    rank: 5

  interval_min:
    description: >-
      Sampling interval in minutes for time-series records. Stored as a float
      to allow NaN (missing) values. Nullable.
    range: float
    required: false
    unit:
      ucum_code: min
    minimum_value: 0.0
    maximum_value: 1000000.0
    rank: 6

  volumetric_water_content_m3_m3:
    description: >-
      Volumetric water content as a fraction (cubic meters of water per cubic
      meter of soil).
    range: float
    required: false
    unit:
      ucum_code: m3/m3
    minimum_value: 0.0
    maximum_value: 1.0
    rank: 7

  gravimetric_water_content_gH2O_gs:
    description: >-
      Gravimetric water content (grams of water per gram of dry soil). The
      generous upper bound accommodates organic-rich soils.
    range: float
    required: false
    unit:
      ucum_code: g/g
    minimum_value: 0.0
    maximum_value: 10.0
    rank: 8

  water_potential_kPa:
    description: >-
      Soil water potential in kilopascals. Values are non-positive (zero at
      saturation, increasingly negative as the soil dries).
    range: float
    required: false
    unit:
      ucum_code: kPa
    minimum_value: -1000000.0
    maximum_value: 0.0
    rank: 9

#=================================
# Enumerations
#=================================
enums:

  QCFlagVocabulary:
    description: >-
      Controlled vocabulary for QC flag values. Equivalent to the
      ``QCFlagVocabulary`` enum in ``target_schema.py``.
    permissible_values:
      d1:
        description: Depth approximated from a reported range.
      g1:
        description: >-
          Coordinates from Varadharajan et al. (not present in the source
          dataset).
      g2:
        description: Coordinates not available from any source.
