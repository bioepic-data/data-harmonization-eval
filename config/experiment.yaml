experiment:
  name: "wfsfa_harmonization_agent_eval"
  random_seed: 42
  n_stochastic_runs: 5          # repeats per dataset per mode (variance / pass@k)
  model_id: "claude-sonnet-4-5" # pin exact model + version for reproducibility
  skill1_version: "0.1"         # pin skill versions; they evolve, results must be attributable
  skill2_version: "0.2"

  # Temperature and other model parameters for reproducibility
  model_params:
    temperature: 1.0
    max_tokens: 8000
    top_p: 1.0

modes:                          # the three evaluation modes per dataset
  - skill1_isolated
  - skill2_oracle               # skill2 fed gold curator bundle
  - end_to_end

# Baseline configurations for comparison
baselines:
  - name: "single_call_llm"
    description: "Non-agentic single-call LLM without skill structure"
  - name: "no_exemplars"
    description: "Agent with exemplars removed (isolates value of 19 references)"
  - name: "naive_heuristic"
    description: "Naive string-matching heuristic baseline"

paths:
  gold_dir: "data/gold"
  prospective_dir: "data/prospective"
  raw_cache: "data/raw_cache"
  results: "results"
  cluster_metadata: "data/cluster_metadata.csv"

# Thresholds and tolerances
thresholds:
  float_tolerance: 1e-6         # for numeric column comparison
  min_cell_agreement: 0.95      # threshold for "acceptable" harmonization
  min_confidence_for_auto_include: 0.8

# Statistical parameters
statistics:
  bootstrap_iterations: 10000
  confidence_level: 0.95
  mixed_effects_formula: "metric ~ mode + similarity + (1|dataset) + (1|cluster)"
